name: MineSightFarm
version: '${version}'
main: com.minesight.farm.MineSightFarmPlugin
api-version: '1.21'
folia-supported: true
description: Server-side ore scanning, spectator teleporting, and capture orchestration for the MineSight dataset farm.
authors: [kopec]
commands:
  minesightfarm:
    description: Control the MineSight dataset farm (regionized ore scan + teleport).
    usage: /minesightfarm <scan <ore> [radius] | capture [count] | status | tp | stop>
    aliases: [msf]
